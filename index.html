<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>宵鳴き館 | 縦画面版 改善版</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="top-strip">
      <div class="hud-left">
        <div id="mapName" class="map-name">宵鳴き館 玄関ホール</div>
        <div id="hintText" class="hint">次の目的がここに表示されます</div>
      </div>
      <div class="hud-right">
        <button id="saveBtn" class="ui-btn small">保存</button>
        <button id="menuBtn" class="ui-btn small">タイトル</button>
      </div>
    </header>

    <div id="inventoryBar" class="inventory"></div>

    <section class="game-stage">
      <canvas id="game" width="240" height="320" aria-label="宵鳴き館"></canvas>
      <div id="overlay" class="overlay hidden"></div>

      <div id="titleScreen" class="screen title-screen">
        <div class="title-panel">
          <div class="eyebrow">FREE HORROR GAME</div>
          <h1>宵鳴き館</h1>
          <p class="subtitle">読むほどに、出口が遠のく。</p>
          <div class="title-copy">
            雨宿りのつもりで入った古い洋館。
            少女・ユイは、館に残された記録を辿りながら地下の扉へ向かう。
            けれどこの館は、読んだ者の順番を忘れない。
          </div>
          <div class="title-actions">
            <button id="startBtn" class="ui-btn large">ゲームを始める</button>
            <button id="continueBtn" class="ui-btn large secondary">続きから</button>
          </div>
          <div class="title-footer">縦画面対応 / 左下スティック移動 / 「調べる」ボタンのみで反応</div>
        </div>
      </div>

      <div id="endingScreen" class="screen hidden">
        <div class="ending-panel">
          <div id="endingLabel" class="ending-label">ENDING</div>
          <h2 id="endingTitle">記録の終わり</h2>
          <p id="endingDesc" class="ending-desc"></p>
          <div class="title-actions">
            <button id="restartBtn" class="ui-btn large">タイトルへ戻る</button>
          </div>
        </div>
      </div>
    </section>

    <section class="bottom-panel">
      <div id="messageBox" class="message-box hidden">
        <div id="speakerName" class="speaker"></div>
        <div id="messageText" class="message-text"></div>
        <div id="messagePrompt" class="message-prompt">タップ / 調べる で進む</div>
      </div>

      <div id="choiceBox" class="choice-box hidden"></div>

      <section class="touch-ui">
        <div class="move-cluster">
          <div id="joystick" class="joystick" aria-label="移動スティック">
            <div class="joystick-ring"></div>
            <div id="joystickKnob" class="joystick-knob"></div>
          </div>
          <div class="move-caption">左下スティックで移動</div>
        </div>

        <div class="action-cluster">
          <button id="interactBtn" class="action-btn primary">調べる</button>
          <div class="sub-actions">
            <button id="runBtn" class="action-btn small toggle">歩く</button>
            <button id="guideBtn" class="action-btn small ghost">次の目的</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
