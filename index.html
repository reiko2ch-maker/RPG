<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>宵鳴き館</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="rotateHint">横向きにすると遊びやすいです</div>

  <main class="app-shell">
    <section class="game-stage">
      <canvas id="game" width="320" height="180" aria-label="宵鳴き館"></canvas>

      <div id="hud" class="hud">
        <div class="hud-left">
          <div id="mapName" class="map-name">宵鳴き館 玄関ホール</div>
          <div id="hintText" class="hint">館の気配を調べよう</div>
        </div>
        <div class="hud-right">
          <button id="saveBtn" class="ui-btn small">保存</button>
          <button id="menuBtn" class="ui-btn small">題名</button>
        </div>
      </div>

      <div id="inventoryBar" class="inventory"></div>

      <div id="messageBox" class="message-box hidden">
        <div id="speakerName" class="speaker"></div>
        <div id="messageText" class="message-text"></div>
        <div id="messagePrompt" class="message-prompt">タップ / 調べる で進む</div>
      </div>

      <div id="choiceBox" class="choice-box hidden"></div>

      <div id="overlay" class="overlay hidden"></div>

      <div id="titleScreen" class="screen title-screen">
        <div class="title-panel">
          <div class="eyebrow">FREE HORROR GAME</div>
          <h1>宵鳴き館</h1>
          <p class="subtitle">読むほどに、出口が遠のく。</p>
          <div class="title-copy">
            古い洋館へ迷い込んだ少女・ユイは、
            誰かの記録を辿りながら地下の扉へ向かう。
            けれど、この館は読んだ者の足音を忘れない。
          </div>
          <div class="title-actions">
            <button id="startBtn" class="ui-btn large">ゲームを始める</button>
            <button id="continueBtn" class="ui-btn large secondary">続きから</button>
          </div>
          <div class="title-footer">移動：方向ボタン / 調べる：右下 / 保存対応</div>
        </div>
      </div>

      <div id="endingScreen" class="screen hidden">
        <div class="ending-panel">
          <div id="endingLabel" class="ending-label">ENDING</div>
          <h2 id="endingTitle">記録の終わり</h2>
          <p id="endingDesc" class="ending-desc"></p>
          <div class="title-actions">
            <button id="restartBtn" class="ui-btn large">タイトルへ戻る</button>
          </div>
        </div>
      </div>
    </section>

    <section class="touch-ui">
      <div class="dpad">
        <button data-dir="up" class="dir-btn up">▲</button>
        <button data-dir="left" class="dir-btn left">◀</button>
        <button data-dir="down" class="dir-btn down">▼</button>
        <button data-dir="right" class="dir-btn right">▶</button>
      </div>

      <div class="action-cluster">
        <button id="interactBtn" class="action-btn primary">調べる</button>
        <button id="runBtn" class="action-btn">走る</button>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
